<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViksitOS - Home</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/citizen.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23FF9933' width='100' height='33'/><rect fill='%23fff' y='33' width='100' height='34'/><rect fill='%23138808' y='67' width='100' height='33'/><circle cx='50' cy='50' r='12' fill='%23000080'/></svg>">
</head>
<body>
  <div class="citizen-container">
    <!-- Header -->
    <header class="citizen-header glass">
      <div class="header-left">
        <div class="logo-small">
          <div class="logo-stripe saffron"></div>
          <div class="logo-stripe white"></div>
          <div class="logo-stripe green"></div>
        </div>
        <span class="logo-text">ViksitOS</span>
      </div>
      
      <div class="header-center">
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="appSearch" class="search-input" placeholder="Search apps...">
        </div>
      </div>
      
      <div class="header-right">
        <button class="btn btn-icon btn-outline" id="themeToggle" title="Toggle dark mode">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button class="btn btn-icon btn-outline notification-btn" id="notifBtn">
          <i class="fa-solid fa-bell"></i>
          <span class="notif-badge hidden" id="notifBadge">0</span>
        </button>
        <div class="user-menu" id="userMenu">
          <div class="user-avatar" id="userAvatar">U</div>
          <span class="user-name" id="userName">User</span>
          <i class="fa-solid fa-chevron-down"></i>
          <div class="dropdown-menu" id="dropdownMenu">
            <div class="dropdown-item" id="dropdownProfile">
              <i class="fa-solid fa-user"></i>
              <span>Profile</span>
            </div>
            <div class="dropdown-item" id="dropdownLogout">
              <i class="fa-solid fa-right-from-bracket"></i>
              <span>Logout</span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="citizen-main">
      <!-- Welcome Banner -->
      <div class="welcome-banner glass-card">
        <div class="welcome-content">
          <h1 id="welcomeText">Welcome back!</h1>
          <p>Access all government services from one place</p>
        </div>
        <div class="welcome-illustration">
          <i class="fa-solid fa-india"></i>
        </div>
      </div>

      <!-- App Launcher Grid -->
      <div class="app-launcher">
        <h2 class="section-title">Apps</h2>
        <div class="app-grid" id="appGrid">
          <div class="app-item" data-app="apply" onclick="openApp('apply')">
            <div class="app-icon apply-icon">
              <i class="fa-solid fa-file-circle-plus"></i>
            </div>
            <span class="app-name">Apply Services</span>
          </div>
          
          <div class="app-item" data-app="applications" onclick="openApp('applications')">
            <div class="app-icon applications-icon">
              <i class="fa-solid fa-folder-open"></i>
            </div>
            <span class="app-name">My Applications</span>
          </div>
          
          <div class="app-item" data-app="documents" onclick="openApp('documents')">
            <div class="app-icon documents-icon">
              <i class="fa-solid fa-file-shield"></i>
            </div>
            <span class="app-name">Documents</span>
          </div>
        </div>
      </div>
    </main>

    <!-- App View (Full Screen Overlay) -->
    <div class="app-view" id="appView">
      <div class="app-view-header">
        <button class="btn btn-icon btn-outline" id="appBackBtn">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h2 id="appViewTitle">App</h2>
        <div class="app-view-spacer"></div>
      </div>
      <div class="app-view-content" id="appViewContent">
        <!-- Dynamic app content loads here -->
      </div>
    </div>

    <!-- Notifications Panel -->
    <div class="notif-panel" id="notifPanel">
      <div class="notif-header">
        <h3>Notifications</h3>
        <button class="btn btn-sm btn-outline" id="markAllRead">Mark all read</button>
      </div>
      <div class="notif-list" id="notifList">
        <!-- Notifications load here -->
      </div>
    </div>
    <div class="notif-overlay" id="notifOverlay"></div>
  </div>

  <!-- Chatbot -->
  <div class="chatbot" id="chatbot">
    <button class="chatbot-toggle" id="chatbotToggle">
      <i class="fa-solid fa-robot"></i>
    </button>
    <div class="chatbot-window" id="chatbotWindow">
      <div class="chatbot-header">
        <div class="chatbot-avatar">
          <i class="fa-solid fa-robot"></i>
        </div>
        <div class="chatbot-info">
          <h4>Viksit Assistant</h4>
          <span class="chatbot-status">Online</span>
        </div>
        <button class="chatbot-close" id="chatbotClose">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="chatbot-messages" id="chatbotMessages">
        <!-- Messages load here -->
      </div>
      <div class="chatbot-options" id="chatbotOptions">
        <!-- Options load here -->
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- PWA Install Prompt -->
  <div class="pwa-prompt" id="pwaPrompt">
    <div class="pwa-content">
      <div class="pwa-icon">
        <div class="logo-stripe saffron"></div>
        <div class="logo-stripe white"></div>
        <div class="logo-stripe green"></div>
      </div>
      <div class="pwa-text">
        <h4>Install ViksitOS</h4>
        <p>Get quick access from your home screen</p>
      </div>
      <div class="pwa-actions">
        <button class="btn btn-sm btn-primary" id="pwaInstall">Install</button>
        <button class="btn btn-sm btn-outline" id="pwaDismiss">Later</button>
      </div>
    </div>
    <button class="pwa-close" id="pwaClose"><i class="fa-solid fa-xmark"></i></button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/pwa.js"></script>
  <script src="js/citizen-home.js"></script>
  <script src="js/citizen-apply.js"></script>
  <script src="js/citizen-applications.js"></script>
  <script src="js/citizen-documents.js"></script>
</body>
</html>
