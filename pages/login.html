<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/ViksitOS/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViksitOS - Login</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23FF9933' width='100' height='33'/><rect fill='%23fff' y='33' width='100' height='34'/><rect fill='%23138808' y='67' width='100' height='33'/><circle cx='50' cy='50' r='12' fill='%23000080'/></svg>">
</head>
<body>
  <div class="login-container">
    <div class="login-bg">
      <div class="bg-circle bg-circle-1"></div>
      <div class="bg-circle bg-circle-2"></div>
      <div class="bg-circle bg-circle-3"></div>
    </div>
    
    <div class="login-card glass">
      <div class="login-header">
        <div class="logo">
          <div class="logo-icon">
            <div class="logo-stripe saffron"></div>
            <div class="logo-stripe white"></div>
            <div class="logo-stripe green"></div>
            <i class="fa-solid fa-ashoka-chakra logo-chakra"></i>
          </div>
          <h1>ViksitOS</h1>
        </div>
        <p class="login-subtitle">Empowering Digital India</p>
      </div>

      <div class="auth-mode-tabs">
        <button class="auth-tab active" data-mode="signin">Sign In</button>
        <button class="auth-tab" data-mode="signup">Sign Up</button>
      </div>

      <div class="login-tabs">
        <button class="tab-btn active" data-role="citizen">
          <i class="fa-solid fa-user"></i>
          <span>Citizen</span>
        </button>
        <button class="tab-btn" data-role="government">
          <i class="fa-solid fa-building-columns"></i>
          <span>Government</span>
        </button>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group signup-only hidden">
          <label class="form-label">Full Name</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="fullName" class="form-input" placeholder="Enter your full name">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required minlength="6">
          </div>
        </div>

        <div class="form-group government-only hidden">
          <label class="form-label">Department</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-building"></i>
            <select id="department" class="form-select">
              <option value="">Select Department</option>
              <option value="Revenue">Revenue Department</option>
              <option value="Municipal">Municipal Corporation</option>
              <option value="Transport">Transport Department</option>
              <option value="Home">Home Department</option>
              <option value="Commerce">Commerce & Industry</option>
              <option value="Labour">Labour Department</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full" id="submitBtn">
          <i class="fa-solid fa-right-to-bracket"></i>
          <span>Sign In</span>
        </button>

        <p class="login-info">
          <i class="fa-solid fa-shield-halved"></i>
          <span id="authInfoText">Sign in to access your account</span>
        </p>
      </form>

      <div class="login-footer">
        <p>Secure authentication powered by Supabase</p>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
